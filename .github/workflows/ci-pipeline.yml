name: Pipeline CI - Flutter Android

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build-and-test:
    name: Build, Lint & Test
    runs-on: ubuntu-latest

    steps:
      # ─────────────────────────────────────────
      # 1. CLONAR CÓDIGO
      # ─────────────────────────────────────────
      - name: Clonar repositorio
        uses: actions/checkout@v4

      # ─────────────────────────────────────────
      # 2. INSTALAR DEPENDENCIAS - Java (para Kotlin/Gradle)
      # ─────────────────────────────────────────
      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ─────────────────────────────────────────
      # 3. INSTALAR DEPENDENCIAS - Flutter
      # ─────────────────────────────────────────
      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.3"
          channel: stable

      - name: Instalar dependencias del proyecto (pub get)
        run: flutter pub get

      # ─────────────────────────────────────────
      # 4. COMPILACIÓN
      # ─────────────────────────────────────────
      - name: Crear api_keys.dart para CI (placeholder seguro)
        run: |
          cat > lib/api_keys.dart << 'EOF'
          class ApiKeys {
            static const String groqKey = 'CI_PLACEHOLDER';
          }
          EOF
      - name: Compilar proyecto Flutter (APK debug)
        run: flutter build apk --debug

      # ─────────────────────────────────────────
      # 5. LINTING
      # ─────────────────────────────────────────
      - name: Linting Flutter (flutter analyze)
        run: flutter analyze || true

      - name: Linting Kotlin (ktlint)
        run: |
          curl -sSLO https://github.com/pinterest/ktlint/releases/download/1.3.1/ktlint
          chmod +x ktlint
          ./ktlint "android/app/src/**/*.kt" || true

      # ─────────────────────────────────────────
      # 6. PRUEBAS UNITARIAS
      # ─────────────────────────────────────────
      - name: Pruebas unitarias Flutter
        run: flutter test --coverage

      - name: Pruebas unitarias Android (JUnit via Gradle)
        run: |
          cd android
          ./gradlew testDebugUnitTest

      # ─────────────────────────────────────────
      # 7. PRUEBAS DE INTEGRACIÓN
      # ─────────────────────────────────────────
      - name: Pruebas de integración Flutter
        run: flutter test integration_test/

      # ─────────────────────────────────────────
      # 8. REPORTE
      # ─────────────────────────────────────────
      - name: Publicar reporte de pruebas unitarias Android
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reporte-junit
          path: android/app/build/reports/tests/testDebugUnitTest/

      - name: Publicar reporte de cobertura Flutter
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reporte-cobertura-flutter
          path: coverage/lcov.info

      # ─────────────────────────────────────────
      # 9. RESULTADO FINAL
      #    Todo OK  → el PR puede integrarse a main
      #    Algún fallo → el pipeline falla y notifica al dev
      # ─────────────────────────────────────────
      - name: Verificar resultado final
        if: failure()
        run: |
          echo "❌ El pipeline falló. Revisa los reportes anteriores."
          echo "La integración a main ha sido cancelada automáticamente."
          exit 1
